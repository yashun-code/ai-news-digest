<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AIニュース">
  <title>AIニュースダイジェスト</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="icon" href="./icon-192.png" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="./icon-180.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="top">
      <h1 id="page-title">AIニュース</h1>
      <p class="date" id="page-subtitle">読み込み中…</p>
    </header>

    <main class="body" id="app" tabindex="-1">
      <div class="loading" role="status">ニュースを読み込んでいます…</div>
    </main>

    <nav class="nav" aria-label="メインナビゲーション">
      <button type="button" data-route="home" aria-label="今週">
        <span class="ico" aria-hidden="true">📰</span><span>今週</span>
      </button>
      <button type="button" data-route="tips" aria-label="使い方">
        <span class="ico" aria-hidden="true">🎓</span><span>使い方</span>
      </button>
      <button type="button" data-route="history" aria-label="履歴">
        <span class="ico" aria-hidden="true">🗂</span><span>履歴</span>
      </button>
      <button type="button" data-route="menu" aria-label="メニュー">
        <span class="ico" aria-hidden="true">☰</span><span>メニュー</span>
      </button>
    </nav>

    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
  </div>
  <script src="./app.js" defer></script>
</body>
</html>

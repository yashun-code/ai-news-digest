name: ダイジェスト自動生成

# 月・水・金 朝に自動実行（狙い 04:23 JST = 前日 19:23 UTC）。
# 分を「23分」にして混雑する毎時00分を避け、早朝に前倒し。
# GitHub Actions のスケジュールは数時間遅れることがあるため、
# 朝のうちに届くよう余裕を持たせている。
# 手動実行（Actions画面の Run workflow ボタン）も可能。
on:
  schedule:
    - cron: '23 19 * * 0,2,4'
  workflow_dispatch:

# 生成したダイジェストをリポジトリにコミットするための書き込み権限
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存をインストール
        run: pip install anthropic

      - name: ダイジェストを生成
        env:
          # APIキーは GitHub Secrets から渡す（コードには絶対に書かない）
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_digest.py

      - name: 使い方コンテンツを生成
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_tips.py

      - name: 変更があればコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add digests/ index.json tips/ tips_index.json
            git commit -m "ダイジェスト自動更新 $(date +%Y-%m-%d)"
            git push
          else
            echo "変更なし。コミットをスキップします。"
          fi
